<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview - The Intelligence Layer</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">Confidant AI</div>
            <div style="color:var(--primary-accent); font-size:0.7rem; font-weight:700; margin-top:0.5rem;">
                ● INTERVIEW MODE ACTIVE
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="/">🏠 Home</a>
            <a href="/interview" class="active">🗣️ Interviews</a>
            <a href="#">📊 Analysis</a>
            <a href="#">⚙️ Settings</a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">

        <!-- Top Bar -->
        <header class="top-bar">
            <div class="logo" style="font-size:1rem;">The Intelligence Layer</div>
            <a href="/" class="btn-ghost">End Session</a>
        </header>

        <!-- Interview Area -->
        <div class="interview-area">

            <div class="interview-card">

                <!-- Header -->
                <div class="card-header">
                    <div>
                        <span class="round-badge">ROUND 1</span>
                        <span class="question-counter">
                            Question <span id="current-q">1</span> of <span id="total-q">5</span>
                        </span>
                    </div>

                    <div class="timer" id="timer">⏱️ 00:00</div>
                </div>

                <!-- Question -->
                <div class="interviewer-prompt">INTERVIEWER PROMPT</div>
                <h2 class="question-text" id="question-text">
                    Loading question...
                </h2>

                <!-- Answer -->
                <div class="response-area">
                    <div class="response-header">
                        <span>YOUR RESPONSE</span>
                        <span>Words: <span id="word-count">0</span></span>
                    </div>

                    <textarea 
                        id="answer-input" 
                        class="response-input"
                        placeholder="Type your answer here...">
                    </textarea>
                    <textarea id="answer-input" placeholder="Type your answer here..."></textarea>


<div class="feedback-box" id="feedback-box" style="display:none;">
    <h3>📊 AI Feedback</h3>
    <pre id="feedback-text"></pre>
</div>
                </div>

                <!-- Buttons -->
                <div class="action-bar">
                    <button class="btn-ghost" id="skip-btn">Skip</button>

                    <div>
                        <button class="btn-primary" id="next-btn">
                            Submit Response →
                        </button>
                        <div class="loader" id="loader"></div>
                    </div>
                </div>

            </div>

        </div>
    </main>

</div>

<!-- JS (VERY IMPORTANT) -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
